services:
  postgres-ms1:
    image: postgres:16-alpine
    container_name: ai-project-postgres-ms1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MS1_DB_USER}
      POSTGRES_PASSWORD: ${MS1_DB_PASSWORD}
      POSTGRES_DB: ${MS1_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_ms1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MS1_DB_USER} -d ${MS1_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ms2:
    image: postgres:16-alpine
    container_name: ai-project-postgres-ms2
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MS2_DB_USER}
      POSTGRES_PASSWORD: ${MS2_DB_PASSWORD}
      POSTGRES_DB: ${MS2_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_ms2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MS2_DB_USER} -d ${MS2_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-project-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: ai-project-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_ms1_data:
  postgres_ms2_data:
  redis_data:
  neo4j_data:
